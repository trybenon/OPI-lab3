<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html >
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <h:outputStylesheet library="css" name="style.css"/>
    <title>lab3|main</title>
</h:head>

<h:body>
        <header class="header">
            <h2>ФИО: Рыжаков Владислав Александрович</h2>
            <h3>Группа: P3223</h3>
            <h3>Номер варианта: 3288</h3>
            <div class="header-logo">
                <img src="resources/images/logo.png" alt="Логотип" />
            </div>
        </header>
    <div class="main-container">
        <div class="graph" id="graphContainer">
            <canvas id="graphCanvas" width="450" height="450"
                    style="cursor: pointer; border: 1px solid #ccc; background-color: white;">
            </canvas>
        </div>

        <h:form id="valForm">
            <p:messages id="msgs" autoUpdate="true" closable="true"/>

            <div id="xForm">
                <p:outputLabel for="x" value="X (-2 ... 2): "/>
                <p:selectOneMenu id="x" value="#{attemptBean.point.x}">
                    <f:selectItem itemValue="-2.0" itemLabel="-2.0"/>
                    <f:selectItem itemValue="-1.5" itemLabel="-1.5"/>
                    <f:selectItem itemValue="-1.0" itemLabel="-1.0"/>
                    <f:selectItem itemValue="-0.5" itemLabel="-0.5"/>
                    <f:selectItem itemValue="0.0" itemLabel="0.0"/>
                    <f:selectItem itemValue="0.5" itemLabel="0.5"/>
                    <f:selectItem itemValue="1.0" itemLabel="1.0"/>
                    <f:selectItem itemValue="1.5" itemLabel="1.5"/>
                    <f:selectItem itemValue="2.0" itemLabel="2.0"/>
                </p:selectOneMenu>
            </div>

            <div id="yForm">
                <p:outputLabel for="y" value="Y (-3 ... 3): "/>
                <p:inputText id="y" value="#{attemptBean.point.y}" placeholder="Введите значение от -3 до 3" required="true"
                             requiredMessage="Не удалось определить координаты. Пожалуйста, выберите Y!"
                             validatorMessage="Y должен быть в диапазоне от -3.0 до 3.0">
                    <f:validateDoubleRange minimum="-3.0" maximum="3.0"/>
                </p:inputText>
            </div>

            <div id="rForm">
                <p:outputLabel for="r" value="R (1 ... 4):"/>
                <p:spinner id="r" value="#{attemptBean.point.r}" min="1" max="4" stepFactor="0.5" required="true" requiredMessage="Не удалось определить радиус. Пожалуйста, выберите R!"
                           validatorMessage="Радиус должен быть в диапазоне от 1 до 4">
                    <p:ajax process="@this" update="@none" oncomplete="redrawGraph()"/>
                    <f:validateDoubleRange minimum="1.0" maximum="4.0"/>
                </p:spinner>
            </div>

            <p:commandButton value="Отправить"
                             action="#{attemptBean.buildResult()}"
                             update="resultTable msgs pointsData"
                             process="@this x y r"
                             oncomplete="redrawGraph()"
                            styleClass="ui-button submit-btn"/>
            <p:button value="Стартовая страница" outcome="index"
                      styleClass="ui-button go-to-start-btn"
                      icon="pi pi-home"/>
            <p:commandButton value="Сбросить результаты"
                             action="#{storageBean.cleanRes()}"
                             update="pointsData resultTable msgs"
                             oncomplete="redrawGraph()"
                             styleClass="ui-button clear-btn"/>

            <h:outputText id="pointsData"
                          value="#{storageBean.jsonResults}"
                          escape="false"
                          style="display:none;" />
            <h:inputHidden id="hiddenX" value="#{attemptBean.point.x}" />
            <h:inputHidden id="hiddenY" value="#{attemptBean.point.y}" />
            <h:inputHidden id="hiddenR" value="#{attemptBean.point.r}"
                           required="true"
                           requiredMessage="Не удалось определить радиус. Пожалуйста, выберите R!"
                           validatorMessage="Радиус должен быть в диапазоне от 1 до 4">
                <f:validateDoubleRange minimum="1.0" maximum="4.0"/>
            </h:inputHidden>



            <p:remoteCommand name="sendClickParams"
                             action="#{attemptBean.buildResult()}"
                             update="resultTable msgs pointsData"
                             oncomplete="redrawGraph()"
                             process="@this hiddenX hiddenY hiddenR"/>
        </h:form>

        <p:dataTable id="resultTable" value="#{storageBean.results}" var="r"
                     paginator="true" rows="10"
                     paginatorPosition="bottom"
                     rowsPerPageTemplate="5,10,15"
                     sortMode="single"
                     stripedRows="true">

            <p:column headerText="ID" sortBy="#{r.id}">
                <h:outputText value="#{r.id}" />
            </p:column>

            <p:column headerText="X" sortBy="#{r.x}">
                <h:outputText value="#{r.x}" />
            </p:column>

            <p:column headerText="Y" sortBy="#{r.y}">
                <h:outputText value="#{r.y}" />
            </p:column>

            <p:column headerText="R" sortBy="#{r.r}">
                <h:outputText value="#{r.r}" />
            </p:column>

            <p:column headerText="Результат" sortBy="#{r.success}">
                <h:outputText value="#{r.success ? 'ПОПАЛ' : 'ПРОМАХ'}"
                              style="color: #{r.success ? 'green' : 'red'}; font-weight: bold;" />
            </p:column>

            <p:column headerText="Время попытки" sortBy="#{r.attemptTime}">
                <h:outputText value="#{r.attemptTime}">
                    <f:convertDateTime pattern="HH:mm:ss" type="zonedDateTime"/>
                </h:outputText>
            </p:column>

            <p:column headerText="Время выполнения">
                <h:outputText value="#{r.execTime} мс" />
            </p:column>
        </p:dataTable>

        <h:outputScript library="js" name="script.js"/>
    </div>
</h:body>
</html>
